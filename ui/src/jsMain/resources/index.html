<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaHAL</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #ComposeTarget { width: 100%; height: 100%; outline: none; }
    </style>
    <script src="skiko.js"></script>
    <script>
        // onWasmReady is exported by skiko.js (wraps its internal wasmSetup Promise).
        // Deferring ui.js until here guarantees every org_jetbrains_skia_* call is available
        // before CanvasBasedWindow makes its first Skia draw call.
        onWasmReady(function () {
            var s = document.createElement('script');
            s.src = 'ui.js';
            document.head.appendChild(s);
        });
    </script>
</head>
<body>
    <canvas id="ComposeTarget"></canvas>
</body>
</html>
