<!DOCTYPE html>
<!--
  HAL CRUD walkthrough — Kotlin/Wasm target, browser.

  Scenario:
    1. GET http://localhost:8080 → parse as HAL, extract templated "projects" link
    2. POST to that template expanded with no vars (creates a new project)
    3. PATCH the "self" link of the created resource (updates description)
    4. GET the same resource with custom Accept and Authorization headers
    5. POST a single file to the project's "files" link
    6. POST a multipart request (file + JSON metadata part) to the same link
    7. GET the uploaded file back (file download → triggers browser save)
    8. GET with template expanded for two-name list + name_op="in"
    9. Extract first embedded "projects" resource; DELETE its self link

  Each step logs the equivalent curl command, response status, and body.

  ── Build ─────────────────────────────────────────────────────────────────────
    ./gradlew :haldish:wasmJsBrowserProductionLibrary

  ── Serve ─────────────────────────────────────────────────────────────────────
  Browsers block Wasm loading from file:// URLs. Serve with any local server:
    npx serve .          # from the repo root
    python3 -m http.server

  Then open:
    http://localhost:3000/examples/wasm/crud-example.html

  Place sample.jpg in examples/wasm/ for the file-upload steps.

  ── Library output path ───────────────────────────────────────────────────────
  Adjust the import path below if Gradle places the output elsewhere:
    haldish/build/compileSync/wasmJs/main/productionLibrary/kotlin/haldish.mjs

  ── API note ──────────────────────────────────────────────────────────────────
  The Wasm target exports top-level functions (not classes) because Kotlin/Wasm
  restricts @JsExport to functions only.  After awaiting any HTTP call, read the
  result with wasmLastStatus() and wasmLastBody().
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HAL CRUD — Wasm</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 1rem 2rem; }
    h1   { color: #9cdcfe; }
    pre  { white-space: pre-wrap; word-break: break-all; }
    .step   { color: #c586c0; font-weight: bold; }
    .curl   { color: #4ec9b0; }
    .status { color: #dcdcaa; }
    .body   { color: #ce9178; }
    .info   { color: #6a9955; }
    .err    { color: #f44747; }
  </style>
</head>
<body>
  <h1>HAL CRUD Walkthrough — Wasm</h1>
  <pre id="out">Running…</pre>

<script type="module">
// ── Import ────────────────────────────────────────────────────────────────────
// The Kotlin/Wasm generated .mjs uses top-level await to initialise the Wasm
// runtime, so all exports are ready as soon as this import resolves.
import {
  wasmGet, wasmPost, wasmPatch, wasmDelete,
  wasmPostFile, wasmPartAdd, wasmPartsClear, wasmPostMultipart,
  wasmLastStatus, wasmLastBody,
  wasmHeaderSet, wasmHeadersClear,
  wasmVarsSet, wasmVarsAdd, wasmExpandVars,
  wasmClose,
} from '../../haldish/build/compileSync/wasmJs/main/productionLibrary/kotlin/haldish.mjs';

const ROOT = 'http://localhost:8080';

const HAL_ACCEPT =
  'application/hal+json, application/hal+xml;q=0.9, ' +
  'application/hal+yaml;q=0.8, application/json;q=0.7, ' +
  'application/xml;q=0.6';

const STATUS_TEXT = {
  200: 'OK', 201: 'Created', 204: 'No Content',
  400: 'Bad Request', 401: 'Unauthorized', 403: 'Forbidden',
  404: 'Not Found', 409: 'Conflict', 500: 'Internal Server Error',
};

// ── Output helpers ────────────────────────────────────────────────────────────

const out = document.getElementById('out');
out.textContent = '';

function log(cls, text) {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = text + '\n';
  out.appendChild(span);
  console.log(text);
}

function step(label)  { log('step', `\n══════ ${label} ══════`); }
function info(text)   { log('info',   '  ' + text); }
function error(text)  { log('err',    'ERROR: ' + text); }

/**
 * body:
 *   null                                              → no body
 *   { type: 'json', content }                         → -d '...'
 *   { type: 'binary', contentType, filename }         → --data-binary @file
 *   { type: 'multipart', parts: [{name, filename?,
 *       content?, contentType}] }                     → -F ...
 *
 * saveAs: when set, appends -o <saveAs> (file download).
 */
function printCurl(method, url, body = null, headers = {}, saveAs = null) {
  const allHeaders = { Accept: HAL_ACCEPT, ...headers };
  let bodyFlags = '';

  if (body?.type === 'json') {
    allHeaders['Content-Type'] = 'application/json';
    bodyFlags = ` \\\n  -d '${body.content}'`;
  } else if (body?.type === 'binary') {
    allHeaders['Content-Type'] = body.contentType;
    bodyFlags = ` \\\n  --data-binary @${body.filename}`;
  } else if (body?.type === 'multipart') {
    bodyFlags = body.parts.map(p =>
      p.filename
        ? ` \\\n  -F '${p.name}=@${p.filename};type=${p.contentType}'`
        : ` \\\n  -F '${p.name}=${p.content};type=${p.contentType}'`
    ).join('');
  }

  const headerFlags = Object.entries(allHeaders)
    .map(([k, v]) => `  -H '${k}: ${v}'`)
    .join(' \\\n');
  const outputFlag = saveAs ? ` \\\n  -o ${saveAs}` : '';
  log('curl', `curl -X ${method} \\\n${headerFlags}${bodyFlags}${outputFlag} \\\n  ${url}`);
}

function printResp() {
  const status = wasmLastStatus();
  const body   = wasmLastBody();
  log('status', `→ ${status} ${STATUS_TEXT[status] ?? ''}`);
  if (body) {
    try { log('body', JSON.stringify(JSON.parse(body), null, 2)); }
    catch { log('body', body); }
  }
}

// ── Browser file helpers ──────────────────────────────────────────────────────

/**
 * Fetch a local file (relative to this HTML) and return its bytes as Int8Array.
 * Requires the page to be served over HTTP (not file://).
 */
async function fetchBytes(path) {
  const resp = await fetch(path);
  return new Int8Array(await resp.arrayBuffer());
}

/**
 * Trigger a browser "Save As" download for the given string body.
 * charCodeAt maps each char to its byte value (ISO-8859-1 semantics).
 * Note: binary content may already be corrupted by Ktor's UTF-8 bodyAsText()
 * upstream; this preserves whatever bytes were received.
 */
function downloadBlob(body, filename, mimeType) {
  const bytes = Uint8Array.from(body, c => c.charCodeAt(0));
  const blob  = new Blob([bytes], { type: mimeType });
  const url   = URL.createObjectURL(blob);
  const a     = Object.assign(document.createElement('a'),
                              { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

// ── Scenario ──────────────────────────────────────────────────────────────────

async function main() {
  try {

    // ── Step 1: GET root, extract the templated "projects" link ─────────────
    step('GET root');
    printCurl('GET', ROOT);
    await wasmGet(ROOT);
    printResp();
    const rootHal = JSON.parse(wasmLastBody());
    const tmpl    = rootHal._links.projects.href;
    info(`→ projects template: ${tmpl}`);

    // ── Step 2: POST to template with no vars → create a project ────────────
    step('POST new project');
    const postUrl    = wasmExpandVars(tmpl);
    const createBody = JSON.stringify({ name: 'My Project', description: 'A sample project' });
    printCurl('POST', postUrl, { type: 'json', content: createBody });
    await wasmPost(postUrl, createBody);
    printResp();
    const created  = JSON.parse(wasmLastBody());
    const selfUrl  = created._links.self.href;
    const filesUrl = created._links.files.href;

    // ── Step 3: PATCH self link → update description ─────────────────────────
    step('PATCH update description');
    const patchBody = JSON.stringify({ description: 'Updated description' });
    printCurl('PATCH', selfUrl, { type: 'json', content: patchBody });
    await wasmPatch(selfUrl, patchBody);
    printResp();

    // ── Step 4: GET with custom Accept and Authorization headers ─────────────
    step('GET with custom headers');
    printCurl('GET', selfUrl, null, {
      Accept: 'application/hal+xml',
      Authorization: 'Bearer example-token',
    });
    wasmHeaderSet('Accept', 'application/hal+xml');
    wasmHeaderSet('Authorization', 'Bearer example-token');
    await wasmGet(selfUrl);
    printResp();

    // ── Step 5: POST single file upload ──────────────────────────────────────
    // fetch() requires the page to be served over HTTP, not file://.
    // Place sample.jpg in the same directory as this HTML file.
    step('POST single file upload');
    const photoBytes = await fetchBytes('sample.jpg');
    printCurl('POST', filesUrl, { type: 'binary', contentType: 'image/jpeg', filename: 'sample.jpg' });
    await wasmPostFile(filesUrl, photoBytes, 'image/jpeg');
    printResp();
    const uploadedFile = JSON.parse(wasmLastBody());
    const fileUrl      = uploadedFile._links.self.href;

    // ── Step 6: POST multipart (file + JSON metadata part) ───────────────────
    step('POST multipart upload');
    const metaJson  = JSON.stringify({ title: 'Project photo', alt: 'Office' });
    const metaBytes = new Int8Array(new TextEncoder().encode(metaJson).buffer);
    printCurl('POST', filesUrl, {
      type: 'multipart',
      parts: [
        { name: 'photo',    filename: 'sample.jpg', contentType: 'image/jpeg' },
        { name: 'metadata', content:  metaJson,     contentType: 'application/json' },
      ],
    });
    wasmPartAdd('photo',    photoBytes, 'image/jpeg',       'sample.jpg');
    wasmPartAdd('metadata', metaBytes,  'application/json', null);
    await wasmPostMultipart(filesUrl);
    printResp();

    // ── Step 7: GET file download (triggers browser Save As) ─────────────────
    step('GET file download');
    printCurl('GET', fileUrl, null, { Accept: 'image/jpeg' }, 'downloaded.jpg');
    wasmHeaderSet('Accept', 'image/jpeg');
    await wasmGet(fileUrl);
    log('status', `→ ${wasmLastStatus()} ${STATUS_TEXT[wasmLastStatus()] ?? ''}`);
    const dlBody = wasmLastBody();
    if (dlBody) {
      downloadBlob(dlBody, 'downloaded.jpg', 'image/jpeg');
      info('→ browser download triggered: downloaded.jpg');
    }

    // ── Step 8: Expand template with list + scalar, then GET ─────────────────
    step('GET filtered list');
    wasmVarsAdd('name', 'My Project');
    wasmVarsAdd('name', 'Other Project');
    wasmVarsSet('name_op', 'in');
    const filterUrl = wasmExpandVars(tmpl);
    printCurl('GET', filterUrl);
    await wasmGet(filterUrl);
    printResp();
    const listHal = JSON.parse(wasmLastBody());

    // ── Step 9: First embedded project → DELETE its self link ────────────────
    step('DELETE first project in result');
    const firstSelf = listHal._embedded.projects[0]._links.self.href;
    printCurl('DELETE', firstSelf);
    await wasmDelete(firstSelf);
    printResp();

  } catch (e) {
    error(e.message ?? String(e));
    console.error(e);
  } finally {
    wasmClose();
  }
}

main();
</script>
</body>
</html>
