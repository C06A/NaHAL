<!DOCTYPE html>
<!--
  Happy-day usage of the core library from the Kotlin/Wasm target (no HTTP).

  Demonstrates:
    - Selecting a top-level link with coreLinkHref()
    - Selecting a link inside an embedded resource with coreEmbeddedLinkHref()

  Build:
    ./gradlew :core:wasmJsBrowserProductionLibrary

  Serve (browsers block Wasm from file:// URLs):
    npx serve .          # from the repo root
    python3 -m http.server

  Open:
    http://localhost:3000/core/src/test/wasm/simple-example.html

  Library path:
    core/build/compileSync/wasmJs/main/productionLibrary/kotlin/core.mjs
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Core HAL Simple Test — Wasm</title>
  <style>
    body  { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 2rem; }
    h1    { color: #9cdcfe; }
    .pass { color: #4ec9b0; font-weight: bold; }
    .fail { color: #f44747; font-weight: bold; }
    pre   { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Core HAL Simple Test — Wasm</h1>
  <pre id="out">Loading…</pre>

<script type="module">
import {
  coreLinkHref,
  coreEmbeddedLinkHref,
} from '../../../../build/compileSync/wasmJs/main/productionLibrary/kotlin/core.mjs';

const out = document.getElementById('out');
out.textContent = '';

function log(cls, text) {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = text + '\n';
  out.appendChild(span);
}

function assert(condition, message) {
  if (!condition) throw new Error(message);
}

try {
  const HAL_JSON =
    '{"_links":{' +
    '"self":{"href":"/orders"},' +
    '"search":{"href":"/orders{?page,size}","templated":true}' +
    '},"_embedded":{"orders":[{"_links":{"self":{"href":"/orders/1"}}}]}}';

  // ── Test 1: select top-level link ─────────────────────────────────────────────
  const selfHref = coreLinkHref(HAL_JSON, 'self');
  assert(selfHref === '/orders', `Expected /orders, got ${selfHref}`);
  log('pass', `✓  top-level href: ${selfHref}`);

  // ── Test 2: select embedded link ──────────────────────────────────────────────
  const embeddedHref = coreEmbeddedLinkHref(HAL_JSON, 'orders', 'self');
  assert(embeddedHref === '/orders/1', `Expected /orders/1, got ${embeddedHref}`);
  log('pass', `✓  embedded href:  ${embeddedHref}`);

  log('pass', '\nAll core WASM tests passed ✓');

} catch (e) {
  log('fail', 'FAIL: ' + (e.message ?? String(e)));
  console.error(e);
}
</script>
</body>
</html>
